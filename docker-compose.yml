version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URI: mongodb://mongo:27017/snipvault
      SECRET_TOKEN: change-me
      BASE_URL: http://localhost:3001/
      HOST: smtp.example.com
      SERVICE: smtp
      EMAIL_PORT: 587
      SECURE: "false"
      USER: noreply@example.com
      PASS: change-me
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongo
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:3001
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo_data:
